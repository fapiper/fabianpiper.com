#cloud-config
package_update: false

runcmd:
  # Reset iptables to bypass restrictive OCI Ubuntu defaults
  - iptables -P INPUT ACCEPT
  - iptables -P FORWARD ACCEPT
  - iptables -F
  - iptables -X

  # Disable IPv6 and force IPv4 for apt
  - sysctl -w net.ipv6.conf.all.disable_ipv6=1
  - sysctl -w net.ipv6.conf.default.disable_ipv6=1
  - echo 'Acquire::ForceIPv4 "true";' > /etc/apt/apt.conf.d/99force-ipv4

  # Wait for internet connectivity via the ingress NAT gateway
  - |
    echo "Waiting for internet connectivity..."
    until curl -sf --connect-timeout 5 https://get.k3s.io > /dev/null 2>&1; do
      sleep 15
    done
    echo "Internet connectivity confirmed."

  - apt-get update -qq
  - apt-get install -y curl iptables-persistent
  - netfilter-persistent save


  # Install K3s server
  - |
    curl -sfL https://get.k3s.io | sh -s - server \
      --token ${k3s_token} \
      --tls-san ${public_ip} \
      --disable traefik \
      --disable servicelb \
      --node-label role=server

  # Wait for k3s binary
  - until [ -f /usr/local/bin/k3s ]; do sleep 2; done

  # Configure GHCR registry credentials
  - mkdir -p /etc/rancher/k3s
  - |
    cat > /etc/rancher/k3s/registries.yaml <<'REGISTRIES'
    configs:
      ghcr.io:
        auth:
          username: ${git_username}
          password: ${git_pat}
    REGISTRIES
  - chmod 0644 /etc/rancher/k3s/registries.yaml
  - systemctl restart k3s

  - |
    iptables -I INPUT 1 -p tcp --dport 80 -j ACCEPT
    iptables -I INPUT 1 -p tcp --dport 443 -j ACCEPT

    if command -v netfilter-persistent >/dev/null; then
      netfilter-persistent save
    fi

  # Initial K3s Wait
  - sleep 20
  - /usr/local/bin/k3s kubectl wait --for=condition=Ready nodes --all --timeout=300s

  # Bootstrap Envoy Gateway via Helm (before ArgoCD to break cold-start deadlock)
  - curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  - /usr/local/bin/k3s kubectl create namespace envoy-gateway-system || true
  - |
    KUBECONFIG=/etc/rancher/k3s/k3s.yaml helm install eg oci://docker.io/envoyproxy/gateway-helm \
      --version v1.3.2 \
      --namespace envoy-gateway-system \
      --wait --timeout 300s

  # Install ArgoCD
  - /usr/local/bin/k3s kubectl create namespace argocd || true
  - /usr/local/bin/k3s kubectl apply --server-side -k https://github.com/argoproj/argo-cd/manifests/crds?ref=v3.3.0
  - /usr/local/bin/k3s kubectl apply --server-side -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/v3.3.0/manifests/install.yaml

  # Wait for ArgoCD components
  - sleep 10
  - /usr/local/bin/k3s kubectl wait --for=condition=established --timeout=300s crd/applications.argoproj.io
  - /usr/local/bin/k3s kubectl rollout restart deployment/argocd-applicationset-controller -n argocd
  - /usr/local/bin/k3s kubectl wait --for=condition=available --timeout=600s deployment/argocd-server -n argocd

  # Configure ArgoCD Git credentials
  - |
    /usr/local/bin/k3s kubectl apply -f - <<EOF
    apiVersion: v1
    kind: Secret
    metadata:
      name: argocd-github-repo
      namespace: argocd
      labels:
        argocd.argoproj.io/secret-type: repository
    type: Opaque
    stringData:
      type: git
      url: ${git_repo_url}
      username: ${git_username}
      password: ${git_pat}
    EOF

  # Deploy root application
  - curl -sfL https://raw.githubusercontent.com/fapiper/fabianpiper.com/main/kubernetes/bootstrap/root.yaml | /usr/local/bin/k3s kubectl apply -f -

  # Prepare Patch Files
  - |
    cat > /tmp/patch-vault-store.yaml <<EOF
    apiVersion: external-secrets.io/v1
    kind: ClusterSecretStore
    metadata:
      name: oci-vault
    spec:
      provider:
        oracle:
          vault: ${vault_id}
          region: eu-frankfurt-1
          principalType: InstancePrincipal
    EOF
  - |
    cat > /tmp/patch-cluster-issuer.yaml <<EOF
    apiVersion: cert-manager.io/v1
    kind: ClusterIssuer
    metadata:
      name: cloudflare-issuer
    spec:
      acme:
        email: ${git_email}
        server: https://acme-v02.api.letsencrypt.org/directory
        privateKeySecretRef:
          name: cloudflare-issuer-account-key
        solvers:
          - dns01:
              cloudflare:
                apiTokenSecretRef:
                  name: cloudflare-api-token
                  key: api-token
    EOF

  # Post-install configurations
  - |
    echo "Waiting for external-secrets-webhook and applying ClusterSecretStore..."
    # Wir loopen das apply selbst, da der Webhook oft erst 10-20s NACH dem Deployment-Start reagiert
    until /usr/local/bin/k3s kubectl apply -f /tmp/patch-vault-store.yaml; do
      echo "External-secrets webhook not ready yet. Retrying in 15s..."
      sleep 15
    done

    echo "Waiting for cert-manager-webhook and applying ClusterIssuer..."
    until /usr/local/bin/k3s kubectl apply -f /tmp/patch-cluster-issuer.yaml; do
      echo "Cert-manager webhook not ready yet. Retrying in 15s..."
      sleep 15
    done

