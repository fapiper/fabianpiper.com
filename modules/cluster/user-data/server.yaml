#cloud-config
# package_update intentionally disabled: the private subnet has no internet
# connectivity until the ingress node finishes setting up its NAT iptables rules.
# Packages are installed in runcmd AFTER we confirm internet is reachable.
package_update: false

runcmd:
  # Configure iptables (allow all, no NAT needed on server)
  - iptables -P INPUT ACCEPT
  - iptables -P FORWARD ACCEPT
  - iptables -F INPUT
  - iptables -F FORWARD

  # Wait for internet connectivity via the ingress NAT gateway.
  # The ingress cloud-init must finish setting up iptables MASQUERADE before
  # this node can reach the internet. Without this wait, the K3s install curl
  # fails silently and all subsequent k3s commands are "not found".
  - |
    echo "Waiting for internet connectivity..."
    until ping -c 1 -W 5 8.8.8.8 > /dev/null 2>&1; do
      echo "  No route to internet yet, retrying in 15s..."
      sleep 15
    done
    echo "Internet connectivity confirmed."

  - apt-get update -qq
  - apt-get install -y curl iptables-persistent
  - netfilter-persistent save

  # Install K3s server (creates /etc/rancher/k3s/ automatically)
  - |
    curl -sfL https://get.k3s.io | sh -s - server \
      --token ${k3s_token} \
      --tls-san ${public_ip} \
      --disable traefik \
      --disable servicelb \
      --node-label role=server

  # Wait until the k3s binary is present
  - |
    until [ -f /usr/local/bin/k3s ]; do
      echo "Waiting for k3s binary to be written to disk..."
      sleep 2
    done

  # Write GHCR registry credentials after K3s has created /etc/rancher/k3s/
  - mkdir -p /etc/rancher/k3s
  - |
    cat > /etc/rancher/k3s/registries.yaml <<'REGISTRIES'
    configs:
      ghcr.io:
        auth:
          username: ${git_username}
          password: ${git_pat}
    REGISTRIES
  - chmod 0644 /etc/rancher/k3s/registries.yaml
  - systemctl restart k3s

  # Wait for K3s to be ready
  - sleep 20
  - /usr/local/bin/k3s kubectl wait --for=condition=Ready nodes --all --timeout=300s

  # Create ArgoCD namespace
  - /usr/local/bin/k3s kubectl create namespace argocd || true
  # Install ArgoCD core manifests
  - /usr/local/bin/k3s kubectl apply --server-side -k https://github.com/argoproj/argo-cd/manifests/crds?ref=v3.3.0
  - /usr/local/bin/k3s kubectl apply --server-side -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/v3.3.0/manifests/install.yaml

  # Wait for ArgoCD CRDs to be established
  - sleep 10
  - /usr/local/bin/k3s kubectl wait --for=condition=established --timeout=300s crd/applications.argoproj.io
  # Force restart the applicationset-controller to clear a startup crash loop
  - /usr/local/bin/k3s kubectl rollout restart deployment/argocd-applicationset-controller -n argocd

  # Wait for ArgoCD pods to be ready
  - /usr/local/bin/k3s kubectl wait --for=condition=available --timeout=600s deployment/argocd-server -n argocd
  - /usr/local/bin/k3s kubectl wait --for=condition=available --timeout=600s deployment/argocd-repo-server -n argocd
  - /usr/local/bin/k3s kubectl wait --for=jsonpath='{.status.readyReplicas}'=1 --timeout=600s statefulset/argocd-application-controller -n argocd

  # Configure ArgoCD Git credentials
  - |
    /usr/local/bin/k3s kubectl apply -f - <<EOF
    apiVersion: v1
    kind: Secret
    metadata:
      name: argocd-github-repo
      namespace: argocd
      labels:
        argocd.argoproj.io/secret-type: repository
    type: Opaque
    stringData:
      type: git
      url: ${git_repo_url}
      username: ${git_username}
      password: ${git_pat}
    EOF

  # Configure OCI Vault ClusterSecretStore (patch after external-secrets is deployed)
  - |
    cat > /tmp/patch-vault-store.yaml <<EOF
    apiVersion: external-secrets.io/v1
    kind: ClusterSecretStore
    metadata:
      name: oci-vault
    spec:
      provider:
        oracle:
          vault: ${vault_id}
          region: eu-frankfurt-1
          principalType: InstancePrincipal
    EOF

  # Configure cert-manager ClusterIssuer with email
  - |
    cat > /tmp/patch-cluster-issuer.yaml <<EOF
    apiVersion: cert-manager.io/v1
    kind: ClusterIssuer
    metadata:
      name: cloudflare-issuer
    spec:
      acme:
        email: ${git_email}
        server: https://acme-v02.api.letsencrypt.org/directory
        privateKeySecretRef:
          name: cloudflare-issuer-account-key
        solvers:
          - http01:
              gatewayHTTPRoute:
                parentRefs:
                  - name: public-gateway
                    namespace: envoy-gateway-system
                    kind: Gateway
                    group: gateway.networking.k8s.io
    EOF

  # Deploy root application
  - sleep 5
  - curl -sfL https://raw.githubusercontent.com/fapiper/fabianpiper.com/main/kubernetes/bootstrap/root.yaml | /usr/local/bin/k3s kubectl apply -f -

  # Wait for external-secrets CRD to be available (deployed by ArgoCD)
  - |
    echo "Waiting for external-secrets webhook to be ready..."
    until /usr/local/bin/k3s kubectl get deployment external-secrets-webhook -n external-secrets >/dev/null 2>&1; do sleep 10; done
    /usr/local/bin/k3s kubectl wait --for=condition=available --timeout=600s deployment/external-secrets-webhook -n external-secrets

  - /usr/local/bin/k3s kubectl wait --for=condition=established --timeout=300s crd/clustersecretstores.external-secrets.io || true

  # Apply the vault store configuration
  - /usr/local/bin/k3s kubectl apply -f /tmp/patch-vault-store.yaml || true

  # Wait for cert-manager CRD to be available
  - /usr/local/bin/k3s kubectl wait --for=condition=established --timeout=300s crd/clusterissuers.cert-manager.io || true

  # Apply the ClusterIssuer configuration
  - /usr/local/bin/k3s kubectl apply -f /tmp/patch-cluster-issuer.yaml || true

  # Wait for ArgoCD to deploy Envoy Gateway and patch the Gateway with the public IP.
  # This is the declarative equivalent of the manual status patch:
  # Setting spec.addresses causes Envoy Gateway to propagate the IP into
  # status.addresses, which external-dns reads to create Cloudflare DNS records.
  # ArgoCD is configured to ignore spec.addresses (see infrastructure ApplicationSet).
  - |
    MAX_RETRIES=40; RETRY=0
    until /usr/local/bin/k3s kubectl get gateway public-gateway -n envoy-gateway-system >/dev/null 2>&1; do
      RETRY=$((RETRY + 1))
      [ "$RETRY" -ge "$MAX_RETRIES" ] && break
      sleep 30
    done
    if /usr/local/bin/k3s kubectl get gateway public-gateway -n envoy-gateway-system >/dev/null 2>&1; then
      /usr/local/bin/k3s kubectl patch gateway public-gateway -n envoy-gateway-system \
        --type=merge \
        -p "{\"spec\":{\"addresses\":[{\"type\":\"IPAddress\",\"value\":\"${public_ip}\"}]}}" || true
    fi