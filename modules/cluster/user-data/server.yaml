#cloud-config
package_update: true
packages:
  - curl
  - iptables-persistent

write_files:
  - path: /etc/rancher/k3s/registries.yaml
    owner: root:root
    permissions: '0644'
    content: |
      configs:
        ghcr.io:
          auth:
            username: ${git_username}
            password: ${git_pat}

runcmd:
  # Configure iptables
  - iptables -P INPUT ACCEPT
  - iptables -P FORWARD ACCEPT
  - iptables -F INPUT
  - iptables -F FORWARD
  - netfilter-persistent save

  # Install K3s server
  - |
    curl -sfL https://get.k3s.io | sh -s - server \
      --token ${k3s_token} \
      --tls-san ${public_ip} \
      --disable traefik \
      --disable servicelb \
      --node-label role=server

  # Wait for K3s to be ready
  - sleep 30
  - k3s kubectl wait --for=condition=Ready nodes --all --timeout=300s

  # Create ArgoCD namespace
  - k3s kubectl create namespace argocd

  # Install ArgoCD core manifests
  - k3s kubectl apply --server-side -k https://github.com/argoproj/argo-cd/manifests/crds?ref=v3.3.0
  - k3s kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/v3.3.0/manifests/install.yaml

  # Wait for ArgoCD CRDs to be established
  - sleep 10
  - k3s kubectl wait --for=condition=established --timeout=300s crd/applications.argoproj.io
  - k3s kubectl wait --for=condition=established --timeout=300s crd/applicationsets.argoproj.io

  # Force restart the applicationset-controller to clear a startup crash loop
  - k3s kubectl rollout restart deployment/argocd-applicationset-controller -n argocd

  # Wait for ArgoCD pods to be ready
  - k3s kubectl wait --for=condition=available --timeout=600s deployment/argocd-server -n argocd
  - k3s kubectl wait --for=condition=available --timeout=600s deployment/argocd-repo-server -n argocd
  - k3s kubectl wait --for=condition=available --timeout=600s deployment/argocd-applicationset-controller -n argocd

  # Configure ArgoCD Git credentials
  - |
    k3s kubectl apply -f - <<EOF
    apiVersion: v1
    kind: Secret
    metadata:
      name: argocd-github-repo
      namespace: argocd
      labels:
        argocd.argoproj.io/secret-type: repository
    type: Opaque
    stringData:
      type: git
      url: ${git_repo_url}
      username: ${git_username}
      password: ${git_pat}
    EOF

  # Ensure the application-controller is also ready
  - k3s kubectl wait --for=condition=available --timeout=600s deployment/argocd-application-controller -n argocd

  # Configure OCI Vault ClusterSecretStore (patch after external-secrets is deployed)
  - |
    cat > /tmp/patch-vault-store.yaml <<EOF
    apiVersion: external-secrets.io/v1beta1
    kind: ClusterSecretStore
    metadata:
      name: oci-vault
    spec:
      provider:
        oracle:
          vault: ${vault_id}
          region: eu-frankfurt-1
          principalType: InstancePrincipal
    EOF

  # Configure cert-manager ClusterIssuer with email
  - |
    cat > /tmp/patch-cluster-issuer.yaml <<EOF
    apiVersion: cert-manager.io/v1
    kind: ClusterIssuer
    metadata:
      name: cloudflare-issuer
    spec:
      acme:
        email: ${git_email}
        server: https://acme-v02.api.letsencrypt.org/directory
        privateKeySecretRef:
          name: cloudflare-issuer-account-key
        solvers:
          - http01:
              gatewayHTTPRoute:
                parentRefs:
                  - name: public-gateway
                    namespace: envoy-gateway-system
                    kind: Gateway
                    group: gateway.networking.k8s.io
    EOF

  # Deploy root application
  - sleep 5
  - curl -sfL https://raw.githubusercontent.com/fapiper/fabianpiper.com/main/kubernetes/bootstrap/root.yaml | k3s kubectl apply -f -

  # Wait for external-secrets CRD to be available (deployed by ArgoCD)
  - sleep 30
  - k3s kubectl wait --for=condition=established --timeout=300s crd/clustersecretstores.external-secrets.io || true

  # Apply the vault store configuration
  - sleep 10
  - k3s kubectl apply -f /tmp/patch-vault-store.yaml || true

  # Wait for cert-manager CRD to be available
  - k3s kubectl wait --for=condition=established --timeout=300s crd/clusterissuers.cert-manager.io || true

  # Apply the ClusterIssuer configuration
  - sleep 10
  - k3s kubectl apply -f /tmp/patch-cluster-issuer.yaml || true

