#cloud-config
# package_update intentionally disabled so runcmd starts immediately after boot.
# The iptables NAT must be active BEFORE the server node tries to reach the internet.
# Packages are installed in runcmd AFTER NAT is established.
package_update: false

write_files:
  - path: /etc/sysctl.d/99-k3s.conf
    content: |
      net.ipv4.ip_forward = 1
      net.bridge.bridge-nf-call-iptables = 1
    permissions: '0644'

runcmd:
  # Enable IP forwarding IMMEDIATELY - this is the critical first step.
  # The server node cannot reach the internet until forwarding + MASQUERADE is active.
  - sysctl -w net.ipv4.ip_forward=1
  - sysctl -w net.bridge.bridge-nf-call-iptables=1

  # Configure iptables for NAT and forwarding.
  # Done BEFORE apt-get so the private subnet gets internet as fast as possible.
  - |
    DEFAULT_IFACE=$(ip route get 8.8.8.8 | awk '{print $5; exit}')
    iptables -P INPUT ACCEPT
    iptables -P FORWARD ACCEPT
    iptables -F INPUT
    iptables -F FORWARD
    iptables -t nat -F POSTROUTING
    iptables -t nat -F PREROUTING
    iptables -t nat -A POSTROUTING -s 10.0.2.0/24 -o $DEFAULT_IFACE -j MASQUERADE
    iptables -I FORWARD -s 10.0.2.0/24 -j ACCEPT
    iptables -I FORWARD -d 10.0.2.0/24 -j ACCEPT
    iptables -I INPUT -p tcp --dport 22 -j ACCEPT
    iptables -I INPUT -p tcp --dport 80 -j ACCEPT
    iptables -I INPUT -p tcp --dport 443 -j ACCEPT
    iptables -I INPUT -p tcp --dport 6443 -j ACCEPT
    iptables -I FORWARD -s 10.42.0.0/16 -d 10.42.0.0/16 -j ACCEPT
    # Envoy Gateway v1.1.0 adds a +10000 offset to privileged ports in xDS config
    # (Gateway port 80 -> Envoy listens on 10080, 443 -> 10443).
    # With hostNetwork: true, the host must redirect 80/443 to these internal ports.
    iptables -t nat -A PREROUTING -p tcp --dport 80 -j REDIRECT --to-port 10080
    iptables -t nat -A PREROUTING -p tcp --dport 443 -j REDIRECT --to-port 10443

  # Now install packages (ingress has public internet directly, no NAT needed for itself)
  - apt-get update -qq || true
  - apt-get install -y curl iptables-persistent

  # Persist iptables rules so they survive a reboot
  - netfilter-persistent save

  # Wait for K3s server to be ready
  - |
    until curl -k --connect-timeout 5 https://${server_ip}:6443 > /dev/null 2>&1; do
      echo "Waiting for K3s Server at ${server_ip}:6443..."
      sleep 10
    done

  # Install K3s agent with ingress role
  - curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="agent --node-label role=ingress" K3S_URL=https://${server_ip}:6443 K3S_TOKEN=${k3s_token} sh -
