#cloud-config
package_update: true
package_upgrade: true

write_files:
  - path: /etc/sysctl.d/99-nat.conf
    content: |
      net.ipv4.ip_forward = 1
    permissions: '0644'

runcmd:
  - sysctl -w net.ipv4.ip_forward=1
  - sysctl -w net.ipv6.conf.all.disable_ipv6=1
  - sysctl -w net.ipv6.conf.default.disable_ipv6=1

  - |
    iptables -P INPUT ACCEPT
    iptables -P FORWARD ACCEPT
    iptables -P OUTPUT ACCEPT
    iptables -F
    iptables -t nat -F
    iptables -X

    iptables -A INPUT -i lo -j ACCEPT
    iptables -A INPUT -s 10.0.0.0/16 -j ACCEPT
    iptables -A INPUT -m state --state ESTABLISHED,RELATED -j ACCEPT
    iptables -A INPUT -p tcp --dport 22 -j ACCEPT

    # Outbound NAT for private subnet
    iptables -t nat -A POSTROUTING -s 10.0.2.0/24 -j MASQUERADE

    # SNAT forwarded internet→server traffic so return packets route back via ingress
    iptables -t nat -A POSTROUTING -d 10.0.2.0/24 -j MASQUERADE

    # Forward HTTP/HTTPS to Envoy Gateway on the server node (REDIRECT only works locally)
    iptables -t nat -A PREROUTING -p tcp --dport 80 -j DNAT --to-destination ${server_ip}:10080
    iptables -t nat -A PREROUTING -p tcp --dport 443 -j DNAT --to-destination ${server_ip}:10443

  - apt-get update -qq
  - DEBIAN_FRONTEND=noninteractive apt-get install -y iptables-persistent
  - systemctl enable netfilter-persistent
  - netfilter-persistent save
