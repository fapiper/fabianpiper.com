#cloud-config
package_update: false

write_files:
  - path: /etc/sysctl.d/99-k3s.conf
    content: |
      net.ipv4.ip_forward = 1
      net.bridge.bridge-nf-call-iptables = 1
    permissions: '0644'

  - path: /etc/systemd/system/envoy-redirect.service
    content: |
      [Unit]
      Description=Envoy Gateway port redirect rules
      Before=network-pre.target
      Wants=network-pre.target
      DefaultDependencies=no

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      ExecStart=/bin/bash -c '\
        iptables -t nat -C PREROUTING ! -s 10.0.0.0/8 -p tcp --dport 80 -j REDIRECT --to-port 10080 2>/dev/null || \
        iptables -t nat -A PREROUTING ! -s 10.0.0.0/8 -p tcp --dport 80 -j REDIRECT --to-port 10080; \
        iptables -t nat -C PREROUTING ! -s 10.0.0.0/8 -p tcp --dport 443 -j REDIRECT --to-port 10443 2>/dev/null || \
        iptables -t nat -A PREROUTING ! -s 10.0.0.0/8 -p tcp --dport 443 -j REDIRECT --to-port 10443'

      [Install]
      WantedBy=multi-user.target
    permissions: '0644'

runcmd:
  # Enable IP forwarding and disable IPv6 immediately
  - sysctl -w net.ipv4.ip_forward=1
  - sysctl -w net.bridge.bridge-nf-call-iptables=1
  - sysctl -w net.ipv6.conf.all.disable_ipv6=1
  - sysctl -w net.ipv6.conf.default.disable_ipv6=1

  # Configure iptables to bypass restrictive OCI Ubuntu defaults
  - |
    iptables -P INPUT ACCEPT
    iptables -P FORWARD ACCEPT
    iptables -P OUTPUT ACCEPT
    iptables -F
    iptables -t nat -F
    iptables -X

    # Allow loopback and internal K3s/VCN traffic
    iptables -A INPUT -i lo -j ACCEPT
    iptables -A INPUT -s 10.0.0.0/16 -j ACCEPT
    iptables -A INPUT -s 10.42.0.0/16 -j ACCEPT
    iptables -A INPUT -s 10.43.0.0/16 -j ACCEPT

    # Configure NAT for the private subnet
    iptables -t nat -A POSTROUTING -s 10.0.2.0/24 -j MASQUERADE

    # Envoy Gateway REDIRECT (Port 80 -> 10080, 443 -> 10443)
    iptables -t nat -A PREROUTING ! -s 10.0.0.0/8 -p tcp --dport 80 -j REDIRECT --to-port 10080
    iptables -t nat -A PREROUTING ! -s 10.0.0.0/8 -p tcp --dport 443 -j REDIRECT --to-port 10443

  # Install iptables-persistent and enable services
  - apt-get update -qq
  - DEBIAN_FRONTEND=noninteractive apt-get install -y iptables-persistent
  - systemctl enable netfilter-persistent
  - netfilter-persistent save

  # Enable envoy-redirect fallback service
  - systemctl enable envoy-redirect.service
  - systemctl start envoy-redirect.service

  # Verify REDIRECT rules are in place
  - |
    if ! iptables -t nat -L PREROUTING -n | grep -q "redir ports 10080"; then
      echo "REDIRECT rules missing after save, re-applying..."
      iptables -t nat -A PREROUTING ! -s 10.0.0.0/8 -p tcp --dport 80 -j REDIRECT --to-port 10080
      iptables -t nat -A PREROUTING ! -s 10.0.0.0/8 -p tcp --dport 443 -j REDIRECT --to-port 10443
      netfilter-persistent save
    fi

  # Wait for K3s server to be ready
  - |
    until curl -sk --connect-timeout 5 https://${server_ip}:6443 > /dev/null 2>&1; do
      echo "Waiting for K3s Server at ${server_ip}:6443..."
      sleep 10
    done

  # Install K3s agent with ingress role
  - curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="agent --node-label role=ingress" K3S_URL=https://${server_ip}:6443 K3S_TOKEN=${k3s_token} sh -