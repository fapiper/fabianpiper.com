#cloud-config
package_update: false

runcmd:
  # Reset iptables to bypass restrictive OCI Ubuntu defaults
  - iptables -P INPUT ACCEPT
  - iptables -P FORWARD ACCEPT
  - iptables -F
  - iptables -X

  # Disable IPv6
  - sysctl -w net.ipv6.conf.all.disable_ipv6=1
  - sysctl -w net.ipv6.conf.default.disable_ipv6=1

  # Wait for K3s server API
  - |
    echo "Waiting for K3s Server at ${server_ip}:6443..."
    until curl -sf --connect-timeout 5 -k https://${server_ip}:6443 > /dev/null 2>&1; do
      sleep 10
    done

  # Install required packages
  - apt-get update -qq
  - apt-get install -y curl iptables-persistent
  - netfilter-persistent save

  # Install K3s agent
  - curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="agent --node-label role=worker" K3S_URL=https://${server_ip}:6443 K3S_TOKEN=${k3s_token} sh -