# ArgoCD ConfigMap customizations.
#
# resource.customizations.health.monitoring.coreos.com_Prometheus
#   The kube-prometheus-stack chart places the Prometheus CR (monitoring.coreos.com/Prometheus)
#   and the prometheusOperator Deployment in the SAME sync wave (0).
#   ArgoCD's built-in health check for the Prometheus CR waits for the StatefulSet
#   (created by the operator) to be Running.  Because the operator and the CR are in the
#   same wave, ArgoCD blocks waiting for Prometheus health before it has even created the
#   operator Deployment → permanent deadlock.
#   Fix: override the health check to always return Healthy so ArgoCD proceeds to
#   subsequent waves (HTTPRoute at wave 25, etc.).  Actual Prometheus availability is
#   still visible in its status fields; we just stop ArgoCD from blocking on it.
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/instance: argocd-cm
    app.kubernetes.io/part-of: infrastructure
data:
  resource.customizations.health.monitoring.coreos.com_Prometheus: |
    hs = {}
    hs.status = "Healthy"
    hs.message = ""
    return hs

  # resource.customizations.health.external-secrets.io_ExternalSecret
  #   ExternalSecrets sync asynchronously via the ESO operator.  When kube-prometheus-stack
  #   starts syncing, the ClusterSecretStore (oci-vault) may not yet be available because
  #   the external-secrets operator installs in parallel (same ArgoCD sync-wave).
  #   ArgoCD's built-in health check for ExternalSecret waits until the Secret is synced;
  #   a failed sync returns Degraded and blocks all subsequent sync waves — including
  #   wave 25 where the Grafana HTTPRoute lives.  Without the HTTPRoute the Gateway
  #   never learns about /grafana and all traffic falls through to the www catch-all.
  #   Fix: override to always return Healthy so ArgoCD proceeds past wave -5.
  #   ESO retries automatically once the ClusterSecretStore is ready; Grafana recovers
  #   when the grafana-admin Secret is eventually created.
  resource.customizations.health.external-secrets.io_ExternalSecret: |
    hs = {}
    hs.status = "Healthy"
    hs.message = ""
    return hs

