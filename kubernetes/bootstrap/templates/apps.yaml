apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/fapiper/fabianpiper.com.git
        revision: HEAD
        requeueAfterSeconds: 30
        directories:
          - path: kubernetes/apps/*
  template:
    metadata:
      name: "{{.path.basename}}"
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "10"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: https://github.com/fapiper/fabianpiper.com.git
        targetRevision: HEAD
        path: "{{.path.path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.path.basename}}"
      ignoreDifferences:
        - group: gateway.networking.k8s.io
          kind: HTTPRoute
          jqPathExpressions:
            - .metadata.annotations["external-dns.alpha.kubernetes.io/target"]
        - group: external-secrets.io
          kind: ExternalSecret
          jqPathExpressions:
            - .status
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
        retry:
          limit: -1
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 5m
