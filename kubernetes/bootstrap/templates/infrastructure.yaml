apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infrastructure
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/fapiper/fabianpiper.com.git
        revision: HEAD
        directories:
          - path: kubernetes/infrastructure/*
  template:
    metadata:
      name: "{{.path.basename}}"
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "2"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: https://github.com/fapiper/fabianpiper.com.git
        targetRevision: HEAD
        path: "{{.path.path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.path.basename}}"
      ignoreDifferences:
        - group: external-secrets.io
          kind: ClusterSecretStore
          jqPathExpressions:
            - .spec.provider.oracle.vault
        - group: cert-manager.io
          kind: ClusterIssuer
          jqPathExpressions:
            - .spec.acme.email
        - group: gateway.networking.k8s.io
          kind: Gateway
          jqPathExpressions:
            - .spec.addresses  # Set by cloud-init with the OCI public IP; must not be overwritten by ArgoCD
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
          - SkipDryRunOnMissingResource=true
        retry:
          limit: 10
          backoff:
            duration: 30s
            factor: 2
            maxDuration: 10m

