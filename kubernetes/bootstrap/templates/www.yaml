apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: www
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd-image-updater.argoproj.io/image-list: www=ghcr.io/fapiper/fabianpiper.com/www
    argocd-image-updater.argoproj.io/www.update-strategy: digest
    argocd-image-updater.argoproj.io/www.allow-tags: regexp:^latest$
    argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/argocd-image-updater-github-creds
    argocd-image-updater.argoproj.io/www.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/www.helm.image-tag: image.digest
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/fapiper/fabianpiper.com.git
    targetRevision: HEAD
    path: kubernetes/apps/www
  destination:
    server: https://kubernetes.default.svc
    namespace: www
  ignoreDifferences:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      jqPathExpressions:
        - .metadata.annotations["external-dns.alpha.kubernetes.io/target"]
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .status
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: -1
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
