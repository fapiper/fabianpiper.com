# Requires the following secret in OCI Vault:
#   grafana-admin-password  → Grafana admin password (choose a strong password)
#
# Add via Terraform (modules/vault/main.tf) or OCI Console before first deploy.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: grafana
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: grafana
    app.kubernetes.io/part-of: infrastructure
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: grafana-admin
  data:
    - secretKey: admin-password
      remoteRef:
        key: grafana-admin-password

