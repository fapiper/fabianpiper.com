image:
  repository: twinproduction/gatus
  tag: "v5.12.1"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  port: 8080

ingress:
  hostname: status.fabianpiper.com
  gatewayNamespace: envoy-gateway-system

resources:
  requests:
    cpu: "25m"
    memory: "32Mi"
  limits:
    cpu: "100m"
    memory: "64Mi"

config:
  web:
    port: 8080
    address: "0.0.0.0"

  ui:
    title: "Status | fabianpiper.com"
    header: "Status"

  storage:
    type: memory

  endpoints:
    - name: "www.fabianpiper.com"
      url: "https://www.fabianpiper.com"
      interval: 5m
      conditions:
        - "[STATUS] == 200"
        - "[RESPONSE_TIME] < 2000"

    - name: "glg.fabianpiper.com"
      url: "https://glg.fabianpiper.com"
      interval: 5m
      conditions:
        - "[STATUS] == 200"
        - "[RESPONSE_TIME] < 2000"

    - name: "Grafana"
      url: "https://grafana.fabianpiper.com/api/health"
      interval: 5m
      conditions:
        - "[STATUS] == 200"
        - "[RESPONSE_TIME] < 5000"

    - name: "Status Page"
      url: "https://status.fabianpiper.com"
      interval: 5m
      conditions:
        - "[STATUS] == 200"
        - "[RESPONSE_TIME] < 2000"
