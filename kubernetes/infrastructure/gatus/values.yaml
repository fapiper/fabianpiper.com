image:
  repository: twinproduction/gatus
  tag: "v5.12.1"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  port: 8080

# Ingress / Gateway API settings
ingress:
  hostname: status.fabianpiper.com   # Dedicated hostname — avoids sub-path prefix issues
  gatewayNamespace: envoy-gateway-system
  # No subPath: Gatus v5.12.1 ignores web.prefix and serves everything at root.
  # A dedicated hostname lets Gatus work without any path rewriting.

# Container resource requests and limits
resources:
  requests:
    cpu: "25m"
    memory: "32Mi"
  limits:
    cpu: "100m"
    memory: "64Mi"

# Gatus configuration — rendered into a ConfigMap and mounted at /config/config.yaml.
config:
  web:
    port: 8080
    address: "0.0.0.0"
    # No prefix: Gatus v5.12.1 does not register Fiber routes under web.prefix;
    # the field is silently ignored for HTTP routing. Serving at root on a
    # dedicated hostname (status.fabianpiper.com) is the correct approach.

  ui:
    title: "Status | fabianpiper.com"
    header: "Status"

  storage:
    type: memory

  endpoints:
    - name: "www.fabianpiper.com"
      url: "https://www.fabianpiper.com"
      interval: 5m
      conditions:
        - "[STATUS] == 200"
        - "[RESPONSE_TIME] < 2000"

    - name: "glg.fabianpiper.com"
      url: "https://glg.fabianpiper.com"
      interval: 5m
      conditions:
        - "[STATUS] == 200"
        - "[RESPONSE_TIME] < 2000"

    - name: "Grafana"
      # /grafana/api/health returns 200 + JSON without auth (no redirect to /login).
      url: "https://glg.fabianpiper.com/grafana/api/health"
      interval: 5m
      conditions:
        - "[STATUS] == 200"
        - "[RESPONSE_TIME] < 5000"

    - name: "Status Page"
      url: "https://status.fabianpiper.com"
      interval: 5m
      conditions:
        - "[STATUS] == 200"
        - "[RESPONSE_TIME] < 2000"
