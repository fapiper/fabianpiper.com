# Routes glg.fabianpiper.com/status → gatus Service.
# TLS is already terminated by the existing glg-tls certificate on the Gateway
# https listener — no Certificate resource needed here.
#
# Gatus v5 behaviour: web.prefix ("/status") causes Fiber to register ALL
# application routes under the /status group:
#   /status/          → UI HTML
#   /status/api/v1/…  → REST API (used by the SPA for live polling)
#   /health           → health-check endpoint (always at root, no prefix)
#
# Because Gatus owns the entire /status/* path space, the gateway must NOT
# rewrite the path — doing so (ReplacePrefixMatch /) would forward "/" to Gatus
# which has no handler at root, producing "Cannot GET /".
#
# Two rules:
#   1. Exact /status (no trailing slash) → 301 redirect to /status/
#      Without this, browsers that omit the trailing slash receive a Fiber 404.
#   2. PathPrefix /status/ → forward as-is (NO URLRewrite).
#      Gatus receives the full /status/* path and routes it internally.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "gatus.name" . }}-route
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gatus.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "25"
spec:
  parentRefs:
    - name: public-gateway
      namespace: {{ .Values.ingress.gatewayNamespace }}
      sectionName: https
  hostnames:
    - {{ .Values.ingress.hostname | quote }}
  rules:
    # Rule 1: redirect /status (exact) → /status/ (permanent redirect)
    - matches:
        - path:
            type: Exact
            value: {{ .Values.ingress.subPath }}
      filters:
        - type: RequestRedirect
          requestRedirect:
            statusCode: 301
            path:
              type: ReplaceFullPath
              replaceFullPath: {{ .Values.ingress.subPath }}/
    # Rule 2: proxy /status/* to the Gatus pod WITHOUT path rewriting.
    # Gatus (web.prefix: "/status") handles the full path internally:
    #   /status/          → UI HTML
    #   /status/api/v1/…  → REST API
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.ingress.subPath }}/
      backendRefs:
        - name: {{ include "gatus.name" . }}
          port: {{ .Values.service.port }}

