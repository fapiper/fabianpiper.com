# Routes glg.fabianpiper.com/status → gatus Service.
# TLS is already terminated by the existing www-tls certificate on the Gateway
# https listener — no Certificate resource needed here.
#
# Two rules:
#   1. Exact /status (no trailing slash) → 301 redirect to /status/
#      Gatus uses Fiber whose static handler registers routes at /status/ (with trailing
#      slash). Accessing /status without the slash returns Fiber's "Cannot GET /status"
#      instead of the status page. The redirect fixes this for all browsers.
#   2. PathPrefix /status/ → Gatus Service for UI, API (/status/api/…) and assets.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "gatus.name" . }}-route
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gatus.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "25"
spec:
  parentRefs:
    - name: public-gateway
      namespace: {{ .Values.ingress.gatewayNamespace }}
      sectionName: https
  hostnames:
    - {{ .Values.ingress.hostname | quote }}
  rules:
    # Rule 1: redirect /status (exact) → /status/ (permanent redirect)
    - matches:
        - path:
            type: Exact
            value: {{ .Values.ingress.subPath }}
      filters:
        - type: RequestRedirect
          requestRedirect:
            statusCode: 301
            path:
              type: ReplaceFullPath
              replaceFullPath: {{ .Values.ingress.subPath }}/
    # Rule 2: proxy /status/* to the Gatus pod
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.ingress.subPath }}/
      backendRefs:
        - name: {{ include "gatus.name" . }}
          port: {{ .Values.service.port }}

