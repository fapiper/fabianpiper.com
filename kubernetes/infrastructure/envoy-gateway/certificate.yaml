# TLS certificate owned by the envoy-gateway infrastructure application.
# Placing the cert in envoy-gateway-system (same namespace as the Gateway) means:
#   • No cross-namespace ReferenceGrant needed
#   • Gateway HTTPS listener never depends on the www application being healthy
#   • cert-manager issues/renews the cert independently of app deployments
#
# Covers both public hostnames so all HTTPRoutes (www, grafana, status) can
# share a single TLS context on the https listener.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: glg-tls
  namespace: envoy-gateway-system
  labels:
    app.kubernetes.io/name: envoy-gateway
    app.kubernetes.io/instance: envoy-gateway
    app.kubernetes.io/part-of: infrastructure
  annotations:
    argocd.argoproj.io/sync-wave: "11"
spec:
  secretName: glg-tls
  issuerRef:
    name: cloudflare-issuer
    kind: ClusterIssuer
  dnsNames:
    - glg.fabianpiper.com
    - www.fabianpiper.com

