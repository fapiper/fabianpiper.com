apiVersion: v1
kind: ConfigMap
metadata:
  name: oci-vault-config
  namespace: external-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "10"
data:
  vault_ocid: "" # This will be populated by cloud-init during cluster setup
  region: "eu-frankfurt-1"
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: oci-vault
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  provider:
    oracle:
      vault: "" # Vault OCID will be set via cloud-init
      region: "eu-frankfurt-1"
      principalType: InstancePrincipal