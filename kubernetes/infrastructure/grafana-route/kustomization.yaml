apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# All resources target the kube-prometheus-stack namespace (where Grafana lives).
# ArgoCD will also create an empty "grafana-route" namespace (from the directory
# name convention) — this is harmless.
namespace: kube-prometheus-stack
resources:
  - httproute.yaml

