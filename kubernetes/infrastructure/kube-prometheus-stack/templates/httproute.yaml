# HTTPRoute for Grafana at grafana.fabianpiper.com (dedicated subdomain).
#
# Wave -4: intentionally applied BEFORE the upstream chart resources (wave 0).
# Rationale: the kube-prometheus-stack Prometheus Operator Deployment can fail
# to apply (e.g. label-selector mismatch on first install), which blocks all
# subsequent waves. Grafana itself runs independently of the operator — its
# Service exists as long as the Grafana Deployment is healthy. Placing the
# HTTPRoute at wave -4 ensures routing is always configured regardless of
# operator deploy state. Envoy Gateway resolves backends lazily (503 until
# the backend Service is ready, then routes normally).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-route
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kps-wrapper.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
spec:
  parentRefs:
    - name: public-gateway
      namespace: {{ .Values.ingress.gatewayNamespace }}
      sectionName: https
  hostnames:
    - {{ .Values.ingress.hostname | quote }}
  rules:
    - backendRefs:
        - name: {{ .Values.grafanaServiceName }}
          port: 80

