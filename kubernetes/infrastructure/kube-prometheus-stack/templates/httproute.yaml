# Routes glg.fabianpiper.com/grafana → grafana Service (kube-prometheus-stack namespace).
# PathPrefix /grafana is more specific than the www PathPrefix /, so the Gateway
# correctly directs Grafana traffic here.
# TLS is terminated by the existing glg-tls certificate on the Gateway listener.
#
# Sync wave -6 (before wave -5 ExternalSecret and wave 0 chart resources):
#   The grafana-admin ExternalSecret (wave -5) may block wave 0+ if ESO is not yet
#   ready, and the Grafana Deployment (wave 0) may block wave 25+ if the grafana-admin
#   Secret hasn't been created.  By placing the HTTPRoute in wave -6 it is applied
#   before either blocking point.  Envoy Gateway accepts routes with missing backends
#   and returns 503 until the Grafana pod is ready — far preferable to nginx 404 from
#   the www catch-all (which happens when the route is never applied at all).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-route
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-prometheus-stack.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-6"
spec:
  parentRefs:
    - name: public-gateway
      namespace: {{ .Values.ingress.gatewayNamespace }}
      sectionName: https
  hostnames:
    - {{ .Values.ingress.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.ingress.subPath }}
      backendRefs:
        - name: {{ .Values.grafanaServiceName }}
          port: 80

