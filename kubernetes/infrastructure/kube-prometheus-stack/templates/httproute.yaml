# HTTPRoute for Grafana at glg.fabianpiper.com/grafana.
#
# Wave 25 — applied after all Deployments (wave 10-20) are healthy.
# Grafana is configured with serve_from_sub_path: true, so it handles the
# full /grafana prefix itself — no URL rewrite needed here.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-route
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kps-wrapper.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "25"
spec:
  parentRefs:
    - name: public-gateway
      namespace: {{ .Values.ingress.gatewayNamespace }}
      sectionName: https
  hostnames:
    - {{ .Values.ingress.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.ingress.subPath }}
      backendRefs:
        - name: {{ .Values.grafanaServiceName }}
          port: 80

