ingress:
  hostname: grafana.fabianpiper.com
  gatewayNamespace: envoy-gateway-system

grafanaAdmin:
  secretName: grafana-admin
  userKey: admin-user
  passwordKey: admin-password

grafanaServiceName: grafana

kube-prometheus-stack:
  fullnameOverride: "kps"

  alertmanager:
    enabled: false

  grafana:
    enabled: true
    fullnameOverride: "grafana"

    # K3s/containerd blocks chown even for UID 0 on dirs owned by UID 472; fsGroup handles it at kubelet level.
    initChownData:
      enabled: false

    securityContext:
      runAsNonRoot: true
      runAsUser: 472
      runAsGroup: 472
      fsGroup: 472

    admin:
      existingSecret: "grafana-admin"
      userKey: "admin-user"
      passwordKey: "admin-password"

    grafana.ini:
      server:
        domain: "grafana.fabianpiper.com"
        root_url: "https://grafana.fabianpiper.com"
        serve_from_sub_path: false

    # Disable the chart's auto-provisioned default Prometheus datasource; it also sets
    # isDefault: true which conflicts with additionalDataSources and crashes Grafana.
    sidecar:
      datasources:
        defaultDatasourceEnabled: false

    additionalDataSources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: "http://kps-prometheus:9090"
        access: proxy
        isDefault: true
        jsonData:
          timeInterval: "30s"
      - name: Loki
        type: loki
        uid: loki
        url: "http://loki.loki.svc.cluster.local:3100"
        access: proxy
        isDefault: false

    downloadDashboards:
      enabled: false

    persistence:
      enabled: true
      size: 2Gi

    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "300m"
        memory: "512Mi"

  prometheus:
    prometheusSpec:
      retention: 15d
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 5Gi
      resources:
        requests:
          cpu: "200m"
          memory: "512Mi"
        limits:
          cpu: "500m"
          memory: "1Gi"

  prometheusOperator:
    enabled: true
    # Disable webhooks to avoid bootstrap deadlock (webhook not running yet when CRDs are applied).
    admissionWebhooks:
      enabled: false
    tls:
      enabled: false
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"

  # K3s embeds these components; standalone ServiceMonitors would cause scrape failures.
  kubeScheduler:
    enabled: false
  kubeControllerManager:
    enabled: false
  kubeEtcd:
    enabled: false
  kubeProxy:
    enabled: false

  kubelet:
    enabled: true
    serviceMonitor:
      cAdvisor: true

  nodeExporter:
    enabled: true
    serviceMonitor:
      # Force job label to "node-exporter" so community dashboards resolve instances correctly.
      relabelings:
        - targetLabel: job
          replacement: node-exporter

  prometheus-node-exporter:
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "100m"
        memory: "128Mi"

  kubeStateMetrics:
    enabled: true

  kube-state-metrics:
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "100m"
        memory: "128Mi"

