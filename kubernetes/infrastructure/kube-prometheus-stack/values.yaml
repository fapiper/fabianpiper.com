# ─── Wrapper-chart tunables (consumed by templates/ only) ───────────────────

ingress:
  hostname: grafana.fabianpiper.com
  gatewayNamespace: envoy-gateway-system

# Admin credentials — ExternalSecret pulls the password from OCI Vault.
# The resulting K8s Secret is referenced by grafana.admin.existingSecret below.
grafanaAdmin:
  secretName: grafana-admin
  userKey: admin-user
  passwordKey: admin-password

# Must match kube-prometheus-stack.grafana.fullnameOverride so the HTTPRoute
# backend points at the correct service.
grafanaServiceName: grafana

# ─── kube-prometheus-stack sub-chart values ─────────────────────────────────
kube-prometheus-stack:

  # Shorten all resource names to avoid hitting the 63-char label limit.
  fullnameOverride: "kps"

  # ── Alertmanager — disabled (no alert routing needed, saves ~200 Mi RAM) ──
  alertmanager:
    enabled: false

  # ── Grafana ──────────────────────────────────────────────────────────────
  grafana:
    enabled: true
    fullnameOverride: "grafana"   # service name = grafana (referenced by HTTPRoute)

    # Skip init-chown-data: the PVC already has correct ownership from a previous
    # successful run. The init container in v82.x runs as non-root and cannot
    # chown pre-existing files → CrashLoopBackOff. Safe to disable.
    initChownData:
      enabled: false

    # Admin credentials loaded from ExternalSecret (wave -5 in templates/).
    admin:
      existingSecret: "grafana-admin"
      userKey: "admin-user"
      passwordKey: "admin-password"

    # Serve Grafana at the subdomain root (no sub-path needed).
    grafana.ini:
      server:
        root_url: "https://grafana.fabianpiper.com"


    # kube-prometheus-stack already provisions the default Prometheus datasource.
    # Explicit UIDs ensure community dashboards that reference ${DS_PROMETHEUS} /
    # ${DS_LOKI} template variables can resolve them without manual re-mapping.
    additionalDataSources:
      - name: Loki
        type: loki
        uid: loki
        url: "http://loki.loki.svc.cluster.local:3100"
        access: proxy
        isDefault: false

    # ── Dashboard provisioning (downloaded from grafana.com at pod startup) ────
    # downloadDashboards uses an initContainer (curlimages/curl, multi-arch) to
    # fetch JSON from grafana.com and write it into the dashboards folder before
    # Grafana starts.  Dashboards are sourced from the folder defined below.
    downloadDashboards:
      enabled: true

    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: node-exporter
            orgId: 1
            folder: "Node Exporter"
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/node-exporter

    dashboards:
      node-exporter:
        node-exporter-full:
          gnetId: 15282
          revision: 2
          datasource: Prometheus
        node-exporter-11074:
          gnetId: 14055
          revision: 1
          datasource: Prometheus
        node-exporter-en:
          gnetId: 14584
          revision: 2
          datasource: Prometheus

    persistence:
      enabled: true
      size: 2Gi

    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"

  # ── Prometheus ───────────────────────────────────────────────────────────
  prometheus:
    prometheusSpec:
      retention: 15d
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 5Gi
      resources:
        requests:
          cpu: "200m"
          memory: "512Mi"
        limits:
          cpu: "500m"
          memory: "1Gi"

  # ── Prometheus Operator ───────────────────────────────────────────────────
  prometheusOperator:
    enabled: true
    # Disable admission webhooks — no MutatingWebhookConfiguration registered.
    # This avoids the bootstrap deadlock where K8s intercepts CRD creates
    # through a webhook that isn't running yet.
    admissionWebhooks:
      enabled: false
    # Disable TLS on the operator web server — it runs plain HTTP on :8080.
    # No kps-admission Secret is needed; keeps the setup as simple as possible.
    tls:
      enabled: false
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"

  # ── K3s compatibility — embedded components are not individually addressable ──
  # These monitors target standalone kube-* processes that don't exist in K3s.
  # Enabling them would cause scrape failures and, in v82.x, YAML render errors.
  kubeScheduler:
    enabled: false
  kubeControllerManager:
    enabled: false
  kubeEtcd:
    enabled: false
  kubeProxy:
    enabled: false

  # ── kubelet ───────────────────────────────────────────────────────────────
  # Disabled: v82.18.0 kubelet servicemonitor.yaml contains a YAML render bug
  # (mapping values not allowed in this context, line 7) under K3s/K8s 1.34.
  # node-exporter covers host-level metrics; re-enable after a chart upgrade.
  kubelet:
    enabled: false

  # ── node-exporter (DaemonSet — all 3 nodes) ───────────────────────────────
  nodeExporter:
    enabled: true
    serviceMonitor:
      # With fullnameOverride="kps" the default job label becomes
      # "kps-prometheus-node-exporter".  Force it to "node-exporter" so that
      # community dashboards (15282, 14055, 14584) can discover instances via
      # their built-in $job template variable without manual reconfiguration.
      relabelings:
        - targetLabel: job
          replacement: node-exporter

  prometheus-node-exporter:
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "100m"
        memory: "128Mi"

  # ── kube-state-metrics ────────────────────────────────────────────────────
  kubeStateMetrics:
    enabled: true

  kube-state-metrics:
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "100m"
        memory: "128Mi"

