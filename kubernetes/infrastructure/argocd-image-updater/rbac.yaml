apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-image-updater
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-image-updater
    app.kubernetes.io/instance: argocd-image-updater
    app.kubernetes.io/part-of: infrastructure
---
# Namespaced Role — Image Updater only needs access within the argocd namespace.
# A cluster-wide Secrets/ConfigMaps read is unnecessary and exposes all Secrets in every namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-image-updater
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-image-updater
    app.kubernetes.io/instance: argocd-image-updater
    app.kubernetes.io/part-of: infrastructure
rules:
  - apiGroups: [""]
    resources: [secrets]
    resourceNames: [argocd-image-updater-github-creds]
    verbs: [get]
  - apiGroups: [""]
    resources: [configmaps]
    resourceNames: [argocd-image-updater-config]
    verbs: [get]
  - apiGroups: [argoproj.io]
    resources: [applications]
    verbs: [get, list, update, patch]
  - apiGroups: [""]
    resources: [events]
    verbs: [create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-image-updater
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-image-updater
    app.kubernetes.io/instance: argocd-image-updater
    app.kubernetes.io/part-of: infrastructure
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argocd-image-updater
subjects:
  - kind: ServiceAccount
    name: argocd-image-updater
    namespace: argocd
