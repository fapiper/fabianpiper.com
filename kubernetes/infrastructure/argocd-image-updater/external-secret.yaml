apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-image-updater-github-creds
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-image-updater
    app.kubernetes.io/instance: argocd-image-updater
    app.kubernetes.io/part-of: infrastructure
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: argocd-image-updater-github-creds
    template:
      type: Opaque
      data:
        # "username:token" — consumed by GITHUB_CREDENTIALS env var for image pull auth
        credentials: "{{ .git_username | trim }}:{{ .git_pat | trim }}"
        # Used by GIT_USERNAME / GIT_PASSWORD env vars on the Deployment
        git_username: "{{ .git_username | trim }}"
        git_pat: "{{ .git_pat | trim }}"
        # Required by image-updater's git write-back (git:secret: method).
        # The write-back code reads exactly "username" and "password" key names.
        username: "{{ .git_username | trim }}"
        password: "{{ .git_pat | trim }}"
  data:
    - secretKey: git_username
      remoteRef:
        key: git-username
    - secretKey: git_pat
      remoteRef:
        key: git-pat

