apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: regcred-sync
  namespace: www
  annotations:
    argocd.argoproj.io/sync-wave: "18"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: regcred
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "ghcr.io": {
                "username": "{{ .git_username | trim }}",
                "password": "{{ .git_pat | trim }}",
                "auth": "{{ printf "%s:%s" (.git_username | trim) (.git_pat | trim) | b64enc }}"
              }
            }
          }
  data:
    - secretKey: git_username
      remoteRef:
        key: git-username
    - secretKey: git_pat
      remoteRef:
        key: git-pat
