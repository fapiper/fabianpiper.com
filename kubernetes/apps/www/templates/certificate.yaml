{{- if .Values.tls.create }}
# Certificate is only created when tls.create=true.
# By default (tls.create: false) the TLS cert is owned by the
# envoy-gateway infrastructure application (kubernetes/infrastructure/envoy-gateway/certificate.yaml)
# which keeps the Gateway's HTTPS listener independent of this application.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.tls.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "www.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "18"
spec:
  secretName: {{ .Values.tls.secretName }}
  issuerRef:
    name: {{ .Values.tls.issuerName }}
    kind: {{ .Values.tls.issuerKind }}
  commonName: {{ .Values.ingress.hostname | quote }}
  dnsNames:
    - {{ .Values.ingress.hostname | quote }}
    {{- if .Values.ingress.secondaryHostname }}
    - {{ .Values.ingress.secondaryHostname | quote }}
    {{- end }}
{{- end }}
