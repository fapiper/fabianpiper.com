# Syncs the GHCR pull secret (regcred) from OCI Vault (git-username + git-pat).
# The dockerconfigjson value uses ESO Go-template expressions (evaluated at runtime
# by the External Secrets Operator, not by Helm). Backtick raw-string literals are
# used inside Helm actions to safely emit the {{ }} delimiters ESO expects.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: regcred-sync
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "www.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "18"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: regcred
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"username":"{{ `{{` }} .git_username | trim {{ `}}` }}","password":"{{ `{{` }} .git_pat | trim {{ `}}` }}","auth":"{{ `{{` }} printf `%s:%s` (.git_username | trim) (.git_pat | trim) | b64enc {{ `}}` }}"}}}
  data:
    - secretKey: git_username
      remoteRef:
        key: git-username
    - secretKey: git_pat
      remoteRef:
        key: git-pat

